<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BCHUSDT Trading Terminal</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: {
        display: ['Space Grotesk', 'sans-serif'],

<style>
:root {
  --bg: #060a12;
  --bg2: #0c1220;
  --bg3: #111a2e;
  --border: #1a2540;
  --border-glow: rgba(16,185,129,0.15);
  --fg: #e4e9f0;
  --muted: #5a6a82;
  --accent: #10b981;
  --accent2: #059669;
  --buy: #22c55e;
  --sell: #ef4444;
  --hold: #f59e0b;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--fg); font-family: 'Space Grotesk', sans-serif; overflow-x: hidden; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--muted); }

.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  transition: all 0.3s ease;
}
.card:hover {
  border-color: var(--border-glow);
  box-shadow: 0 0 30px rgba(16,185,129,0.06);
}

.pulse-dot {
  width: 8px; height: 8px; border-radius: 50%;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(1.5); }
}

.nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 16px; border-radius: 8px;
  color: var(--muted); cursor: pointer;
  transition: all 0.2s ease; font-size: 14px; font-weight: 500;
}
.nav-item:hover { color: var(--fg); background: var(--bg3); }
.nav-item.active {
  color: var(--accent); background: rgba(16,185,129,0.1);
  border-left: 3px solid var(--accent);
}
.nav-item i { width: 20px; text-align: center; font-size: 15px; }

.btn {
  padding: 8px 18px; border-radius: 8px; border: none;
  font-family: 'Space Grotesk', sans-serif; font-weight: 600;
  font-size: 13px; cursor: pointer; transition: all 0.2s;
  display: inline-flex; align-items: center; gap: 6px;
}
.btn-primary { background: var(--accent); color: #000; }
.btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }
.btn-danger { background: rgba(239,68,68,0.15); color: var(--sell); border: 1px solid rgba(239,68,68,0.3); }
.btn-danger:hover { background: rgba(239,68,68,0.25); }
.btn-secondary { background: var(--bg3); color: var(--fg); border: 1px solid var(--border); }
.btn-secondary:hover { border-color: var(--accent); }
.btn-sm { padding: 5px 12px; font-size: 12px; }

.mono { font-family: 'JetBrains Mono', monospace; }
.text-buy { color: var(--buy); }
.text-sell { color: var(--sell); }
.text-hold { color: var(--hold); }
.text-accent { color: var(--accent); }
.text-muted { color: var(--muted); }

.badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 12px; border-radius: 20px;
  font-weight: 700; font-size: 13px; letter-spacing: 0.5px;
}
.badge-buy { background: rgba(34,197,94,0.15); color: var(--buy); }
.badge-sell { background: rgba(239,68,68,0.15); color: var(--sell); }
.badge-hold { background: rgba(245,158,11,0.15); color: var(--hold); }

.skeleton {
  background: linear-gradient(90deg, var(--bg3) 25%, var(--border) 50%, var(--bg3) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s ease-in-out infinite;
  border-radius: 6px;
}
@keyframes shimmer { to { background-position: -200% 0; } }

.fade-in { animation: fadeIn 0.35s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
.toast {
  padding: 12px 20px; border-radius: 10px; font-size: 13px; font-weight: 500;
  animation: slideIn 0.3s ease, fadeOut 0.3s ease 2.7s;
  min-width: 250px; box-shadow: 0 8px 30px rgba(0,0,0,0.4);
}
.toast-success { background: rgba(34,197,94,0.15); color: var(--buy); border: 1px solid rgba(34,197,94,0.3); }
.toast-error { background: rgba(239,68,68,0.15); color: var(--sell); border: 1px solid rgba(239,68,68,0.3); }
.toast-info { background: rgba(16,185,129,0.15); color: var(--accent); border: 1px solid rgba(16,185,129,0.3); }
.toast-warn { background: rgba(245,158,11,0.15); color: var(--hold); border: 1px solid rgba(245,158,11,0.3); }
@keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
@keyframes fadeOut { to { opacity: 0; transform: translateX(50px); } }

.stat-value { font-family: 'JetBrains Mono', monospace; font-size: 28px; font-weight: 700; line-height: 1.1; }
.stat-label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }

table { width: 100%; border-collapse: collapse; }
th { text-align: left; padding: 10px 12px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); border-bottom: 1px solid var(--border); font-weight: 600; }
td { padding: 10px 12px; font-size: 13px; border-bottom: 1px solid rgba(26,37,64,0.5); }
tr:hover td { background: rgba(16,185,129,0.03); }

.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 999;
  display: flex; align-items: center; justify-content: center;
  animation: fadeIn 0.2s ease;
}
.modal-content {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 16px;
  padding: 24px; max-width: 480px; width: 90%;
}

.bg-pattern {
  background-image:
    radial-gradient(circle at 20% 20%, rgba(16,185,129,0.03) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(16,185,129,0.02) 0%, transparent 50%);
}

.sidebar { width: 230px; min-width: 230px; }
@media (max-width: 768px) {
  .sidebar { position: fixed; left: -240px; z-index: 100; height: 100vh; transition: left 0.3s; background: var(--bg2); border-right: 1px solid var(--border); }
  .sidebar.open { left: 0; }
  .main-content { margin-left: 0 !important; }
}

.progress-bar { height: 6px; border-radius: 3px; background: var(--bg3); overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }

.loading-overlay {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 40px; gap: 16px;
}
.spinner {
  width: 32px; height: 32px; border: 3px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body class="bg-pattern">

<!-- Toasts -->
<div class="toast-container" id="toasts"></div>

<!-- Modal Container -->

<!-- Header -->
<header class="sticky top-0 z-50 border-b border-[var(--border)]" style="background: rgba(6,10,18,0.85); backdrop-filter: blur(16px);">

        <span class="font-display font-bold text-lg tracking-tight">NeonTrade</span>

      <div class="flex items-center gap-2" id="header-price">

        <span class="mono font-bold text-lg" id="hdr-price">---.--</span>
      </div>
      <div id="header-signal" class="hidden sm:flex items-center gap-2">

      </div>
      <div class="flex items-center gap-2">
        <div class="w-2 h-2 rounded-full" id="hdr-status" style="background: var(--muted);"></div>

      </div>
      <button onclick="refreshData()" class="btn btn-secondary btn-sm" title="Rafraichir les donnees">

<!-- Layout -->
<div class="flex" style="min-height: calc(100vh - 52px);">
  <nav class="sidebar border-r border-[var(--border)] p-4 flex flex-col gap-1" style="background: var(--bg2);" id="sidebar">
    <div class="text-muted text-[10px] uppercase tracking-widest font-bold mb-2 px-3">Navigation</div>
    <div class="nav-item active" data-page="dashboard"><i class="fas fa-th-large"></i>Dashboard</div>
    <div class="nav-item" data-page="chart"><i class="fas fa-chart-area"></i>Chart</div>
    <div class="nav-item" data-page="signal"><i class="fas fa-bolt"></i>Signal</div>
    <div class="nav-item" data-page="strategies"><i class="fas fa-layer-group"></i>Strategies</div>
    <div class="nav-item" data-page="backtest"><i class="fas fa-flask"></i>Backtest</div>
    <div class="nav-item" data-page="compare"><i class="fas fa-balance-scale"></i>Comparatif</div>
    <div class="nav-item" data-page="settings"><i class="fas fa-cog"></i>Parametres</div>
    <div class="nav-item" data-page="debug"><i class="fas fa-bug"></i>Debug</div>
    <div class="mt-auto pt-4 border-t border-[var(--border)]">
      <div class="text-muted text-[10px] uppercase tracking-widest font-bold mb-2 px-3">Systeme</div>
      <div class="px-3 py-2 text-xs text-muted">
        <div class="flex justify-between mb-1"><span>Bougies</span><span class="mono" id="side-candles">0</span></div>
        <div class="flex justify-between"><span>Version</span><span class="mono" id="side-version">---</span></div>
      </div>
    </div>
  </nav>

  <main class="flex-1 p-5 md:p-8 overflow-y-auto main-content" id="main-content"></main>
</div>

<script>
// ============================
// CONFIG
// ============================
const API = '';
const API_TIMEOUT = 60000;    // 60s timeout (Render cold start)
const MAX_RETRIES = 2;
let refreshTimer = null;
let currentPage = 'dashboard';
let chartInstance = null;
let rsiChartInstance = null;

// ============================
// ETAT GLOBAL
// ============================
const state = {
  connected: false,
  price: null,
  signal: null,
  config: null,
  settings: null,
  strategies: [],
  activeStrategy: null,
  dbinfo: null,
  version: null,
  history: [],
  backtestResult: null,
  compareResult: null,
  debugData: null
};

// ============================
// API SERVICE AVEC TIMEOUT + RETRY
// ============================
async function api(endpoint, options = {}, retryCount = 0) {
  const url = `${API}${endpoint}`;
  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), API_TIMEOUT);

  try {
    console.log(`[API] ${options.method || 'GET'} ${url} (tentative ${retryCount + 1})`);
    const resp = await fetch(url, {
      ...options,
      signal: controller.signal,
      headers: { 'Content-Type': 'application/json', ...(options.headers || {}) }
    });
    clearTimeout(timeoutId);

    if (!resp.ok) {
      const text = await resp.text().catch(() => '');
      console.error(`[API] HTTP ${resp.status}: ${text}`);
      throw new Error(`HTTP ${resp.status}`);
    }

    const data = await resp.json();
    console.log(`[API] ${endpoint} OK`, data);
    return data;

  } catch (e) {
    clearTimeout(timeoutId);
    const isTimeout = e.name === 'AbortError';
    const errMsg = isTimeout ? 'Timeout (serveur en reveil?)' : e.message;
    console.error(`[API] Erreur ${endpoint}: ${errMsg}`);

    // Retry si timeout ou erreur reseau
    if (retryCount < MAX_RETRIES && (isTimeout || e.message.includes('Failed to fetch'))) {
      console.log(`[API] Retry ${endpoint} dans 3s...`);
      toast(`Serveur en cours de reveil, retry ${retryCount + 1}/${MAX_RETRIES}...`, 'warn');
      await new Promise(r => setTimeout(r, 3000));
      return api(endpoint, options, retryCount + 1);
    }

    return null;
  }
}

// ============================
// CALCULS TECHNIQUES
// ============================
function calcEMA(closes, period) {
  const result = [closes[0]];
  const k = 2 / (period + 1);
  for (let i = 1; i < closes.length; i++) {
    result.push(closes[i] * k + result[i - 1] * (1 - k));
  }
  return result;
}

function calcRSI(closes, period = 14) {
  const rsi = new Array(closes.length).fill(50);
  if (closes.length < period + 1) return rsi;
  let gainSum = 0, lossSum = 0;
  for (let i = 1; i <= period; i++) {
    const d = closes[i] - closes[i - 1];
    if (d > 0) gainSum += d; else lossSum -= d;
  }
  let avgGain = gainSum / period;
  let avgLoss = lossSum / period;
  rsi[period] = 100 - 100 / (1 + avgGain / (avgLoss || 0.0001));
  for (let i = period + 1; i < closes.length; i++) {
    const d = closes[i] - closes[i - 1];
    avgGain = (avgGain * (period - 1) + (d > 0 ? d : 0)) / period;
    avgLoss = (avgLoss * (period - 1) + (d < 0 ? -d : 0)) / period;
    rsi[i] = 100 - 100 / (1 + avgGain / (avgLoss || 0.0001));
  }
  return rsi;
}

// ============================
// UTILITAIRES
// ============================
function fmt(n, d = 2) { return n != null ? Number(n).toFixed(d) : '---'; }
function fmtPct(n) { return n != null ? (n >= 0 ? '+' : '') + Number(n).toFixed(2) + '%' : '---'; }
function fmtTime(ts) {
  if (!ts) return '---';
  return new Date(ts * 1000).toLocaleString('fr-FR', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
}
function fmtDateTime(ts) {
  if (!ts) return '---';
  return new Date(ts * 1000).toLocaleString('fr-FR');
}

function signalColor(s) {
  if (s === 'BUY') return 'var(--buy)';
  if (s === 'SELL') return 'var(--sell)';
  return 'var(--hold)';
}

function signalBadge(s) {
  if (!s || s === '---') return '<span class="badge badge-hold"><i class="fas fa-minus text-xs"></i>---</span>';
  const cls = s === 'BUY' ? 'badge-buy' : s === 'SELL' ? 'badge-sell' : 'badge-hold';
  const icon = s === 'BUY' ? 'fa-arrow-up' : s === 'SELL' ? 'fa-arrow-down' : 'fa-minus';
  return `<span class="badge ${cls}"><i class="fas ${icon} text-xs"></i>${s}</span>`;
}

function loadingHTML(msg = 'Chargement en cours...') {
  return `<div class="card loading-overlay"><div class="spinner"></div><p class="text-muted text-sm">${msg}</p><p class="text-muted text-xs">Le serveur peut mettre 30-60s a se reveiller</p></div>`;
}

// ============================
// TOAST
// ============================
function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  const icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', info: 'fa-info-circle', warn: 'fa-exclamation-triangle' };
  el.innerHTML = `<i class="fas ${icons[type] || icons.info}"></i> ${msg}`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

// ============================
// MODAL
// ============================
function showModal(title, content, actions = '') {
  const root = document.getElementById('modal-root');
  root.innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal-content fade-in">
        <div class="flex items-center justify-between mb-4">
          <h3 class="font-bold text-lg">${title}</h3>
          <button onclick="closeModal()" class="text-muted hover:text-fg text-lg"><i class="fas fa-times"></i></button>
        </div>
        <div class="mb-5">${content}</div>
        <div class="flex justify-end gap-3">${actions}</div>
      </div>
    </div>`;
}
function closeModal() { document.getElementById('modal-root').innerHTML = ''; }

// ============================
// NAVIGATION
// ============================
document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', () => {
    const page = item.dataset.page;
    if (!page) return;
    navigateTo(page);
    document.getElementById('sidebar').classList.remove('open');
  });
});

function navigateTo(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.page === page));
  renderPage(page);
}

document.getElementById('menu-toggle').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('open');
});

// ============================
// PAGES
// ============================
function renderPage(page) {
  const main = document.getElementById('main-content');
  const renderers = {
    dashboard: renderDashboard,
    chart: renderChart,
    signal: renderSignal,
    strategies: renderStrategies,
    backtest: renderBacktest,
    compare: renderCompare,
    settings: renderSettings,
    debug: renderDebug
  };
  const fn = renderers[page];
  if (fn) {
    main.innerHTML = '<div class="fade-in">' + fn() + '</div>';
    initPage(page);
  }
}

function initPage(page) {
  const inits = {
    dashboard: initDashboard,
    chart: initChart,
    signal: initSignal,
    strategies: initStrategies,
    backtest: initBacktest,
    compare: initCompare,
    settings: initSettings,
    debug: initDebug
  };
  const fn = inits[page];
  if (fn) fn();
}

// ============ DASHBOARD ============
function renderDashboard() {
  return `
    <div class="mb-6">
      <h1 class="font-display text-3xl font-bold tracking-tight">Tableau de bord</h1>
      <p class="text-muted text-sm mt-1">Vue d'ensemble du terminal BCHUSDT</p>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-5">
      <div class="card"><div class="stat-label">Prix actuel</div><div class="stat-value text-accent mono" id="dash-price">---.--</div><div class="text-muted text-xs mt-2 mono" id="dash-price-time">---</div></div>
      <div class="card"><div class="stat-label">Signal</div><div class="mt-2" id="dash-signal">${signalBadge('---')}</div><div class="text-muted text-xs mt-2" id="dash-signal-indicators">Chargement...</div></div>
      <div class="card"><div class="stat-label">Strategie active</div><div class="stat-value text-[var(--fg)] text-xl mono" id="dash-strategy-name">---</div><div class="text-muted text-xs mt-2" id="dash-strategy-params">---</div></div>
    </div>
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-5">
      <div class="card text-center"><div class="stat-label">Bougies</div><div class="stat-value text-lg mono" id="dash-candles">0</div></div>
      <div class="card text-center"><div class="stat-label">Timeframe</div><div class="stat-value text-lg mono" id="dash-timeframe">---</div></div>
      <div class="card text-center"><div class="stat-label">EMA Fast / Slow</div><div class="stat-value text-lg mono" id="dash-ema">--- / ---</div></div>
      <div class="card text-center"><div class="stat-label">RSI</div><div class="stat-value text-lg mono" id="dash-rsi">---</div></div>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div class="card">
        <h3 class="font-semibold text-sm mb-3 flex items-center gap-2"><i class="fas fa-database text-accent"></i>Base de donnees</h3>
        <div class="space-y-2 text-sm">
          <div class="flex justify-between"><span class="text-muted">Min</span><span class="mono" id="dash-db-min">---</span></div>
          <div class="flex justify-between"><span class="text-muted">Max</span><span class="mono" id="dash-db-max">---</span></div>
          <div class="flex justify-between"><span class="text-muted">Total</span><span class="mono" id="dash-db-count">---</span></div>
        </div>
      </div>
      <div class="card">
        <h3 class="font-semibold text-sm mb-3 flex items-center gap-2"><i class="fas fa-sliders-h text-accent"></i>Configuration</h3>
        <div class="space-y-2 text-sm">
          <div class="flex justify-between"><span class="text-muted">Paire</span><span class="mono">BCHUSDT</span></div>
          <div class="flex justify-between"><span class="text-muted">Historique</span><span class="mono" id="dash-cfg-history">---</span></div>
          <div class="flex justify-between"><span class="text-muted">RSI Periode</span><span class="mono" id="dash-cfg-rsi">---</span></div>
          <div class="flex justify-between"><span class="text-muted">Version</span><span class="mono" id="dash-cfg-version">---</span></div>
        </div>
      </div>
    </div>
  `;
}

async function initDashboard() {
  const [price, signal, config, dbinfo, active, version, stats] = await Promise.all([
    api('/price'), api('/signal'), api('/config'), api('/dbinfo'),
    api('/active-strategy'), api('/version'), api('/stats')
  ]);
  if (price && !price.error) {
    document.getElementById('dash-price').textContent = fmt(price.price, 4);
    document.getElementById('dash-price-time').textContent = 'MAJ: ' + fmtTime(price.time);
  }
  if (signal && !signal.error) {
    document.getElementById('dash-signal').innerHTML = signalBadge(signal.signal);
    document.getElementById('dash-signal-indicators').innerHTML =

async function initChart() {

      const opt = document.createElement('option');

      sel.appendChild(opt);
    });
  }

}

async function loadChart() {
  const area = document.getElementById('chart-area');
  if (area) area.innerHTML = loadingHTML('Chargement des bougies...');

  const history = await api('/history');
  if (!history || history.length === 0) {
    if (area) area.innerHTML = '<div class="card text-center py-10"><i class="fas fa-exclamation-triangle text-3xl text-hold mb-3"></i><p class="text-muted">Aucune donnee historique. Cliquez Refresh puis reessayez.</p></div>';
    return;
  }

  let emaFast = 9, emaSlow = 20, emaTrend = 50, rsiPeriod = 14;
  const stratSel = document.getElementById('chart-strategy-select');
  if (stratSel && stratSel.value) {
    const strat = await api('/strategy/' + stratSel.value);
    if (strat && !strat.error) {
      emaFast = strat.ema_fast; emaSlow = strat.ema_slow;
      emaTrend = strat.ema_trend; rsiPeriod = strat.rsi_period;
    }
  }

  const sorted = [...history].sort((a, b) => a.timestamp - b.timestamp);
  const closes = sorted.map(c => c.close);
  const emaFastData = calcEMA(closes, emaFast);
  const emaSlowData = calcEMA(closes, emaSlow);
  const emaTrendData = calcEMA(closes, emaTrend);
  const rsiData = calcRSI(closes, rsiPeriod);

  const candleData = sorted.map(c => ({ time: c.timestamp, open: c.open, high: c.high, low: c.low, close: c.close }));
  const emaFastLine = sorted.map((c, i) => ({ time: c.timestamp, value: emaFastData[i] }));
  const emaSlowLine = sorted.map((c, i) => ({ time: c.timestamp, value: emaSlowData[i] }));
  const emaTrendLine = sorted.map((c, i) => ({ time: c.timestamp, value: emaTrendData[i] }));
  const rsiLine = sorted.map((c, i) => ({ time: c.timestamp, value: rsiData[i] }));
  const volData = sorted.map(c => ({
    time: c.timestamp, value: c.volume,
    color: c.close >= c.open ? 'rgba(34,197,94,0.25)' : 'rgba(239,68,68,0.25)'
  }));

  const markers = [];
  for (let i = 1; i < sorted.length; i++) {
    const pf = emaFastData[i-1], cf = emaFastData[i];
    const ps = emaSlowData[i-1], cs = emaSlowData[i];
    const rv = rsiData[i], tv = emaTrendData[i], p = closes[i];
    if (pf <= ps && cf > cs && rv > 55 && p > tv)
      markers.push({ time: sorted[i].timestamp, position: 'belowBar', color: '#22c55e', shape: 'arrowUp', text: 'BUY' });
    else if (pf >= ps && cf < cs)
      markers.push({ time: sorted[i].timestamp, position: 'aboveBar', color: '#ef4444', shape: 'arrowDown', text: 'SELL' });
  }

  if (chartInstance) { chartInstance.remove(); chartInstance = null; }
  if (rsiChartInstance) { rsiChartInstance.remove(); rsiChartInstance = null; }

  // Render chart HTML
  area.innerHTML = `
    <div class="card mb-3" style="padding:8px;"><div id="trading-chart" style="height:450px;"></div></div>
    <div class="card" style="padding:8px;">
      <div class="flex items-center gap-3 mb-1 px-2">
        <span class="text-muted text-xs font-semibold">RSI (${rsiPeriod})</span>
        <span class="mono text-xs" id="chart-rsi-value">---</span>
      </div>
      <div id="rsi-chart" style="height:150px;"></div>
    </div>
    <div class="mt-3 flex items-center gap-4 text-xs text-muted">
      <span><span style="color:#10b981;">___</span> EMA Fast</span>
      <span><span style="color:#f59e0b;">___</span> EMA Slow</span>
      <span><span style="color:#8b5cf6;">___</span> EMA Trend</span>
      <span><span style="color:#22c55e;">&#9650;</span> Buy</span>
      <span><span style="color:#ef4444;">&#9660;</span> Sell</span>
    </div>
  `;

  const chartContainer = document.getElementById('trading-chart');
  chartInstance = LightweightCharts.createChart(chartContainer, {
    width: chartContainer.clientWidth, height: 450,
    layout: { background: { type: 'solid', color: 'transparent' }, textColor: '#5a6a82', fontSize: 11, fontFamily: 'JetBrains Mono' },
    grid: { vertLines: { color: 'rgba(26,37,64,0.5)' }, horzLines: { color: 'rgba(26,37,64,0.5)' } },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
    rightPriceScale: { borderColor: 'rgba(26,37,64,0.8)' },
    timeScale: { borderColor: 'rgba(26,37,64,0.8)', timeVisible: true },
    handleScroll: { mouseWheel: true, pressedMouseMove: true },
    handleScale: { axisPressedMouseMove: true, mouseWheel: true, pinch: true }
  });

  const cs = chartInstance.addCandlestickSeries({
    upColor: '#22c55e', downColor: '#ef4444',
    borderUpColor: '#22c55e', borderDownColor: '#ef4444',
    wickUpColor: '#22c55e80', wickDownColor: '#ef444480'
  });
  cs.setData(candleData);
  if (markers.length > 0) cs.setMarkers(markers);

  chartInstance.addLineSeries({ color: '#10b981', lineWidth: 1, title: `EMA${emaFast}` }).setData(emaFastLine);
  chartInstance.addLineSeries({ color: '#f59e0b', lineWidth: 1, title: `EMA${emaSlow}` }).setData(emaSlowLine);
  chartInstance.addLineSeries({ color: '#8b5cf6', lineWidth: 1, lineStyle: 2, title: `EMA${emaTrend}` }).setData(emaTrendLine);

  const vs = chartInstance.addHistogramSeries({ priceFormat: { type: 'volume' }, priceScaleId: 'volume' });
  chartInstance.priceScale('volume').applyOptions({ scaleMargins: { top: 0.85, bottom: 0 } });
  vs.setData(volData);
  chartInstance.timeScale().fitContent();

  // RSI
  const rsiContainer = document.getElementById('rsi-chart');
  rsiChartInstance = LightweightCharts.createChart(rsiContainer, {
    width: rsiContainer.clientWidth, height: 150,
    layout: { background: { type: 'solid', color: 'transparent' }, textColor: '#5a6a82', fontSize: 10, fontFamily: 'JetBrains Mono' },
    grid: { vertLines: { color: 'rgba(26,37,64,0.3)' }, horzLines: { color: 'rgba(26,37,64,0.3)' } },
    rightPriceScale: { borderColor: 'rgba(26,37,64,0.8)', scaleMargins: { top: 0.1, bottom: 0.1 } },
    timeScale: { borderColor: 'rgba(26,37,64,0.8)', timeVisible: true, visible: false },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal }
  });
  rsiChartInstance.addLineSeries({ color: '#a78bfa', lineWidth: 1.5 }).setData(rsiLine);
  rsiChartInstance.addLineSeries({ color: 'rgba(34,197,94,0.3)', lineWidth: 1, lineStyle: 2 })
    .setData(sorted.map(c => ({ time: c.timestamp, value: 30 })));
  rsiChartInstance.addLineSeries({ color: 'rgba(239,68,68,0.3)', lineWidth: 1, lineStyle: 2 })
    .setData(sorted.map(c => ({ time: c.timestamp, value: 70 })));
  rsiChartInstance.timeScale().fitContent();

  // Sync
  chartInstance.timeScale().subscribeVisibleLogicalRangeChange(r => { if (r) rsiChartInstance.timeScale().setVisibleLogicalRange(r); });
  rsiChartInstance.timeScale().subscribeVisibleLogicalRangeChange(r => { if (r) chartInstance.timeScale().setVisibleLogicalRange(r); });

  const lastRSI = rsiData[rsiData.length - 1];
  const rsiEl = document.getElementById('chart-rsi-value');
  if (rsiEl) { rsiEl.textContent = fmt(lastRSI, 1); rsiEl.style.color = lastRSI > 70 ? 'var(--sell)' : lastRSI < 30 ? 'var(--buy)' : 'var(--fg)'; }

  new ResizeObserver(() => {
    chartInstance.applyOptions({ width: chartContainer.clientWidth });
    rsiChartInstance.applyOptions({ width: rsiContainer.clientWidth });
  }).observe(chartContainer);
}

function renderStrategies() {

async function initStrategies() {
  const container = document.getElementById('strategies-content');
  const [strategies, active] = await Promise.all([api('/strategies'), api('/active-strategy')]);

  if (!strategies || strategies.length === 0) {
    container.innerHTML = '<div class="card text-center py-10"><i class="fas fa-layer-group text-3xl text-muted mb-3"></i><p class="text-muted">Aucune strategie trouvee</p></div>';
    return;
  }

  const activeId = active && !active.error ? active.id : null;
  let html = '<div class="grid gap-4">';

  for (const s of strategies) {
    const isActive = s.id === activeId;
    const detail = await api('/strategy/' + s.id);
    if (!detail || detail.error) continue;

    html += `
      <div class="card ${isActive ? 'ring-1 ring-[var(--accent)]' : ''}" style="${isActive ? 'border-color: var(--accent);' : ''}">
        <div class="flex items-start justify-between flex-wrap gap-3">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-lg flex items-center justify-center" style="background: ${isActive ? 'rgba(16,185,129,0.15)' : 'var(--bg3)'};">
              <i class="fas fa-layer-group ${isActive ? 'text-accent' : 'text-muted'}"></i>
            </div>
            <div>
              <div class="font-bold flex items-center gap-2">${detail.name} ${isActive ? '<span class="badge badge-buy text-[10px]">ACTIVE</span>' : ''}</div>
              <div class="text-muted text-xs mono">ID: ${detail.id}</div>
            </div>
          </div>
          <div class="flex items-center gap-2 flex-wrap">
            ${!isActive ? `<button onclick="setActiveStrategy(${detail.id})" class="btn btn-primary btn-sm"><i class="fas fa-play"></i>Activer</button>` : ''}
            <button onclick="cloneStrategy(${detail.id})" class="btn btn-secondary btn-sm"><i class="fas fa-copy"></i>Cloner</button>
            ${!isActive ? `<button onclick="deleteStrategy(${detail.id}, '${detail.name}')" class="btn btn-danger btn-sm"><i class="fas fa-trash"></i></button>` : ''}
          </div>
        </div>
        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-3 mt-4 pt-4 border-t border-[var(--border)]">
          <div><div class="stat-label">EMA Fast</div><div class="mono font-semibold">${detail.ema_fast}</div></div>
          <div><div class="stat-label">EMA Slow</div><div class="mono font-semibold">${detail.ema_slow}</div></div>
          <div><div class="stat-label">EMA Trend</div><div class="mono font-semibold">${detail.ema_trend}</div></div>
          <div><div class="stat-label">RSI</div><div class="mono font-semibold">${detail.rsi_period} / min ${detail.rsi_min}</div></div>
          <div><div class="stat-label">SL / TP</div><div class="mono font-semibold text-sell">${detail.stop_loss}% / <span class="text-buy">${detail.take_profit}%</span></div></div>
        </div>
      </div>`;
  }
  html += '</div>';
  container.innerHTML = html;
}

async function setActiveStrategy(id) {
  const r = await api('/active-strategy/' + id);
  if (r && r.success) { toast('Strategie activee', 'success'); initStrategies(); }
  else toast('Erreur activation', 'error');
}

async function cloneStrategy(id) {
  const r = await api('/strategy/' + id + '/clone', { method: 'POST' });
  if (r && r.success) { toast('Strategie clonee (ID: ' + r.new_strategy_id + ')', 'success'); initStrategies(); }
  else toast('Erreur clonage', 'error');
}

function deleteStrategy(id, name) {
  showModal('Confirmer la suppression',
    `<p class="text-sm">Supprimer <strong>${name}</strong> (ID: ${id}) ?</p>`,
    `<button onclick="closeModal()" class="btn btn-secondary">Annuler</button>
     <button onclick="confirmDeleteStrategy(${id})" class="btn btn-danger"><i class="fas fa-trash"></i>Supprimer</button>`);
}

async function confirmDeleteStrategy(id) {
  closeModal();
  const r = await api('/strategy/' + id + '/delete');
  if (r && r.success) { toast('Strategie supprimee', 'success'); initStrategies(); }
  else toast('Erreur suppression', 'error');
}

      <div class="flex items-center justify-between mb-2"><span class="text-sm font-medium">Performance</span><span class="mono text-sm" style="color:${pos?'var(--buy)':'var(--sell)'};">${fmtPct(r.profit_pct)}</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${Math.min(Math.max(r.profit_pct+10,0),100)}%;background:${pos?'var(--buy)':'var(--sell)'};"></div></div>
    </div>
    ${r.strategy_name?`<div class="mb-4 text-sm text-muted">Strategie: <span class="text-accent font-semibold">${r.strategy_name}</span> (ID: ${r.strategy_id})</div>`:''}
    <div class="card">
      <h3 class="font-semibold text-sm mb-4 flex items-center gap-2"><i class="fas fa-list text-accent"></i>Historique des trades <span class="badge badge-hold text-[10px]">${r.trades_count} trades</span></h3>
      ${r.trades&&r.trades.length>0?`
        <div class="overflow-x-auto"><table>
          <thead><tr><th>#</th><th>Entree</th><th>Prix achat</th><th>Sortie</th><th>Prix vente</th><th>Raison</th><th>Capital</th><th>P&L</th></tr></thead>
          <tbody>${r.trades.map(t=>{const w=t.profit>=0;return`<tr>
            <td class="mono text-muted">${t.trade}</td>
            <td class="mono text-xs">${fmtTime(t.buy_time)}</td>
            <td class="mono">${fmt(t.buy_price,4)}</td>
            <td class="mono text-xs">${fmtTime(t.sell_time)}</td>
            <td class="mono">${fmt(t.sell_price,4)}</td>
            <td><span class="badge ${t.exit_reason==='STOP_LOSS'?'badge-sell':t.exit_reason==='TAKE_PROFIT'?'badge-buy':'badge-hold'} text-[10px]">${t.exit_reason}</span></td>
            <td class="mono">$${fmt(t.capital_after)}</td>
            <td class="mono font-semibold" style="color:${w?'var(--buy)':'var(--sell)'};">${fmtPct(t.profit_pct)}</td>
          </tr>`;}).join('')}</tbody>
        </table></div>
      `:'<p class="text-muted text-sm text-center py-6">Aucun trade genere</p>'}
    </div>
  `;
}

// ============ COMPARATIF ============
function renderCompare() {
  return `
    <div class="mb-6 flex items-center justify-between flex-wrap gap-3">
      <div><h1 class="font-display text-3xl font-bold tracking-tight">Comparatif</h1><p class="text-muted text-sm mt-1">Comparaison des strategies</p></div>
      <button onclick="runCompare()" class="btn btn-primary"><i class="fas fa-balance-scale"></i>Comparer</button>
    </div>
    <div id="compare-content">
      <div class="card text-center py-12"><i class="fas fa-balance-scale text-4xl text-muted mb-3"></i><p class="text-muted">Cliquez sur Comparer pour lancer l'analyse</p></div>
    </div>
  `;
}

async function runCompare() {
  document.getElementById('compare-content').innerHTML = loadingHTML('Comparaison en cours (30-60s)...');
  const result = await api('/backtest/compare');
  if (!result || !result.strategies || result.strategies.length === 0) {
    document.getElementById('compare-content').innerHTML = '<div class="card text-center py-10"><i class="fas fa-exclamation-triangle text-3xl text-hold mb-3"></i><p class="text-muted">Aucun resultat</p></div>';
    return;
  }
  const best = result.best_strategy;
  const maxPct = Math.max(...result.strategies.map(s => Math.abs(s.profit_pct)), 1);
  let html = '';
  if (best) {
    html += `<div class="card mb-5" style="border-color:var(--accent);box-shadow:0 0 20px rgba(16,185,129,0.1);">
      <div class="flex items-center gap-3 mb-3"><div class="w-10 h-10 rounded-lg flex items-center justify-center" style="background:rgba(16,185,129,0.15);"><i class="fas fa-trophy text-accent"></i></div>
      <div><div class="font-bold">Meilleure: ${best.name}</div><div class="text-muted text-xs mono">ID: ${best.id}</div></div></div>
      <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
        <div><div class="stat-label">Profit</div><div class="mono font-bold text-lg" style="color:${best.profit_pct>=0?'var(--buy)':'var(--sell)'};">${fmtPct(best.profit_pct)}</div></div>
        <div><div class="stat-label">Capital</div><div class="mono font-bold text-lg">$${fmt(best.capital_end)}</div></div>
        <div><div class="stat-label">Win Rate</div><div class="mono font-bold text-lg">${fmt(best.win_rate,1)}%</div></div>
        <div><div class="stat-label">Trades</div><div class="mono font-bold text-lg">${best.trades_count} (${best.wins}W/${best.losses}L)</div></div>
      </div></div>`;
  }
  html += `<div class="card mb-5"><h3 class="font-semibold text-sm mb-4"><i class="fas fa-table text-accent mr-2"></i>Classement</h3>
    <div class="overflow-x-auto"><table><thead><tr><th>Rang</th><th>Strategie</th><th>Profit</th><th>Capital</th><th>Trades</th><th>Win Rate</th></tr></thead><tbody>
    ${result.strategies.map((s,i)=>`<tr>
      <td><span class="inline-flex items-center justify-center w-6 h-6 rounded-full text-xs font-bold" style="background:${i===0?'rgba(16,185,129,0.2)':'var(--bg3)'};color:${i===0?'var(--accent)':'var(--muted)'};">${i+1}</span></td>
      <td class="font-semibold">${s.name}</td>
      <td class="mono font-semibold" style="color:${s.profit_pct>=0?'var(--buy)':'var(--sell)'};">${fmtPct(s.profit_pct)}</td>
      <td class="mono">$${fmt(s.capital_end)}</td>
      <td class="mono">${s.trades_count}</td>
      <td class="mono">${fmt(s.win_rate,1)}%</td>
    </tr>`).join('')}</tbody></table></div></div>`;
  html += `<div class="card"><h3 class="font-semibold text-sm mb-4"><i class="fas fa-chart-bar text-accent mr-2"></i>Visualisation</h3><div class="space-y-3">
    ${result.strategies.map(s=>{const w=Math.max(((s.profit_pct+maxPct)/(2*maxPct))*100,2);return`<div><div class="flex items-center justify-between mb-1"><span class="text-sm font-medium">${s.name}</span><span class="mono text-sm" style="color:${s.profit_pct>=0?'var(--buy)':'var(--sell)'};">${fmtPct(s.profit_pct)}</span></div>
    <div class="h-8 rounded-lg" style="background:var(--bg3);"><div class="h-full rounded-lg" style="width:${w}%;background:${s.profit_pct>=0?'rgba(34,197,94,0.2)':'rgba(239,68,68,0.2)'};border:1px solid ${s.profit_pct>=0?'rgba(34,197,94,0.3)':'rgba(239,68,68,0.3)'};"></div></div></div>`;}).join('')}
  </div></div>`;
  document.getElementById('compare-content').innerHTML = html;
}

// ============ PARAMETRES ============
function renderSettings() {
  return `
    <div class="mb-6"><h1 class="font-display text-3xl font-bold tracking-tight">Parametres</h1><p class="text-muted text-sm mt-1">Configuration du systeme</p></div>
    <div id="settings-content">${loadingHTML('Chargement des parametres...')}</div>
  `;
}

async function initSettings() {
  const container = document.getElementById('settings-content');
  const [settings, dbinfo, version, config] = await Promise.all([api('/settings'), api('/dbinfo'), api('/version'), api('/config')]);
  let html = '';
  if (settings) {
    html += `<div class="card mb-5"><h3 class="font-semibold text-sm mb-4"><i class="fas fa-sliders-h text-accent mr-2"></i>Parametres actifs</h3>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">${Object.entries(settings).map(([k,v])=>`<div class="flex items-center justify-between p-3 rounded-lg" style="background:var(--bg3);"><span class="text-sm text-muted">${k}</span><span class="mono font-semibold text-sm">${v}</span></div>`).join('')}</div></div>`;
  }
  if (config) {
    html += `<div class="card mb-5"><h3 class="font-semibold text-sm mb-4"><i class="fas fa-cog text-accent mr-2"></i>Configuration</h3>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">${Object.entries(config).map(([k,v])=>`<div class="flex items-center justify-between p-3 rounded-lg" style="background:var(--bg3);"><span class="text-sm text-muted">${k}</span><span class="mono font-semibold text-sm">${v}</span></div>`).join('')}</div></div>`;
  }
  if (dbinfo) {
    html += `<div class="card mb-5"><h3 class="font-semibold text-sm mb-4"><i class="fas fa-database text-accent mr-2"></i>Base de donnees</h3>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="p-4 rounded-lg text-center" style="background:var(--bg3);"><div class="stat-label">Premier</div><div class="mono font-semibold text-sm mt-1">${fmtDateTime(dbinfo.min_timestamp)}</div></div>
        <div class="p-4 rounded-lg text-center" style="background:var(--bg3);"><div class="stat-label">Dernier</div><div class="mono font-semibold text-sm mt-1">${fmtDateTime(dbinfo.max_timestamp)}</div></div>
        <div class="p-4 rounded-lg text-center" style="background:var(--bg3);"><div class="stat-label">Total</div><div class="mono font-semibold text-lg mt-1 text-accent">${dbinfo.count}</div></div>
      </div></div>`;
  }
  if (version) {
    html += `<div class="card mb-5"><h3 class="font-semibold text-sm mb-3"><i class="fas fa-code-branch text-accent mr-2"></i>Version</h3>
      <div class="p-3 rounded-lg flex items-center justify-between" style="background:var(--bg3);"><span class="text-muted text-sm">Version</span><span class="mono font-bold text-accent">${version.version}</span></div></div>`;
  }
  html += `<div class="card"><h3 class="font-semibold text-sm mb-4"><i class="fas fa-tools text-accent mr-2"></i>Actions</h3>
    <div class="flex flex-wrap gap-3">
      <button onclick="refreshData()" class="btn btn-primary"><i class="fas fa-sync-alt"></i>Rafraichir</button>
      <button onclick="navigateTo('debug')" class="btn btn-secondary"><i class="fas fa-bug"></i>Debug</button>
      <button onclick="navigateTo('chart')" class="btn btn-secondary"><i class="fas fa-chart-area"></i>Chart</button>
    </div></div>`;
  container.innerHTML = html;
}

// ============ DEBUG ============
function renderDebug() {
  return `
    <div class="mb-6 flex items-center justify-between flex-wrap gap-3">
      <div><h1 class="font-display text-3xl font-bold tracking-tight">Debug</h1><p class="text-muted text-sm mt-1">Diagnostic KuCoin API</p></div>
      <button onclick="runDebug()" class="btn btn-primary"><i class="fas fa-bug"></i>Tester KuCoin</button>
    </div>
    <div id="debug-content">
      <div class="card text-center py-12"><i class="fas fa-bug text-4xl text-muted mb-3"></i><p class="text-muted">Cliquez sur Tester pour verifier la connexion KuCoin</p></div>
    </div>
  `;
}
async function initDebug() {}

async function runDebug() {
  document.getElementById('debug-content').innerHTML = loadingHTML('Requete KuCoin en cours...');
  const result = await api('/debug');
  if (!result) {
    document.getElementById('debug-content').innerHTML = '<div class="card text-center py-10"><i class="fas fa-exclamation-triangle text-3xl text-sell mb-3"></i><p class="text-sell">Impossible de contacter le serveur</p></div>';
    return;
  }
  let html = `<div class="card mb-4"><h3 class="font-semibold text-sm mb-3"><i class="fas fa-server text-accent mr-2"></i>Status</h3>
    <div class="flex items-center gap-3"><div class="w-3 h-3 rounded-full" style="background:${result.status_code===200?'var(--buy)':'var(--sell)'};"></div><span class="mono font-bold">HTTP ${result.status_code||'N/A'}</span></div></div>`;
  if (result.response) {
    const resp = result.response;
    html += `<div class="card mb-4"><h3 class="font-semibold text-sm mb-3"><i class="fas fa-code text-accent mr-2"></i>Reponse KuCoin</h3>
      <div class="space-y-2">
        <div class="flex justify-between p-2 rounded" style="background:var(--bg3);"><span class="text-muted text-sm">Code</span><span class="mono text-sm ${resp.code==='200000'?'text-buy':'text-sell'}">${resp.code||'N/A'}</span></div>
        ${resp.data?`<div class="flex justify-between p-2 rounded" style="background:var(--bg3);"><span class="text-muted text-sm">Bougies</span><span class="mono text-sm text-accent">${resp.data.length}</span></div>`:''}
      </div></div>`;
    if (resp.data&&resp.data.length>0) {
      html += `<div class="card mb-4"><h3 class="font-semibold text-sm mb-3"><i class="fas fa-table text-accent mr-2"></i>Dernieres bougies (5)</h3>
        <div class="overflow-x-auto"><table><thead><tr><th>Time</th><th>Open</th><th>Close</th><th>High</th><th>Low</th><th>Volume</th></tr></thead>
        <tbody>${resp.data.slice(0,5).map(c=>`<tr><td class="mono text-xs">${fmtTime(parseInt(c[0]))}</td><td class="mono">${c[1]}</td><td class="mono">${c[2]}</td><td class="mono">${c[3]}</td><td class="mono">${c[4]}</td><td class="mono">${c[5]}</td></tr>`).join('')}</tbody></table></div></div>`;
    }
  }
  html += `<div class="card"><h3 class="font-semibold text-sm mb-3"><i class="fas fa-file-code text-accent mr-2"></i>Reponse brute</h3>
    <pre class="mono text-xs text-muted overflow-x-auto p-3 rounded-lg" style="background:var(--bg);max-height:400px;">${JSON.stringify(result,null,2)}</pre></div>`;
  document.getElementById('debug-content').innerHTML = html;
}

// ============================
// HEADER UPDATE
// ============================
async function updateHeader() {
  const [price, signal] = await Promise.all([api('/price'), api('/signal')]);
  const connected = price && !price.error;
  state.connected = connected;
  document.getElementById('hdr-status').style.background = connected ? 'var(--buy)' : 'var(--sell)';
  document.getElementById('hdr-status-text').textContent = connected ? 'En ligne' : 'Hors ligne';
  if (price && !price.error) {
    const el = document.getElementById('hdr-price');
    const old = state.price;
    state.price = price.price;
    el.textContent = fmt(price.price, 4);
    if (old !== null) {
      el.style.color = price.price > old ? 'var(--buy)' : price.price < old ? 'var(--sell)' : 'var(--fg)';
      setTimeout(() => { el.style.color = 'var(--fg)'; }, 1500);
    }
  }
  if (signal && !signal.error) {
    state.signal = signal.signal;
    document.getElementById('hdr-signal-dot').style.background = signalColor(signal.signal);
    const st = document.getElementById('hdr-signal-text');
    st.textContent = signal.signal;
    st.style.color = signalColor(signal.signal);
  }
  const stats = await api('/stats');
  if (stats) document.getElementById('side-candles').textContent = stats.stored_candles;
  const ver = await api('/version');
  if (ver) document.getElementById('side-version').textContent = ver.version;
}

// ============================
// REFRESH
// ============================
async function refreshData() {
  const icon = document.getElementById('refresh-icon');
  icon.classList.add('fa-spin');
  try {
    const result = await api('/refresh');
    if (result) {
      toast(`${result.loaded} bougies chargees, ${result.stored_candles} en base`, 'success');
      await updateHeader();
      if (currentPage === 'chart') await loadChart();
    } else toast('Erreur lors du rafraichissement', 'error');
  } finally { icon.classList.remove('fa-spin'); }
}

// ============================
// AUTO-REFRESH
// ============================
function startAutoRefresh() {
  if (refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(() => updateHeader(), 60000);
}

// ============================
// INIT
// ============================
async function init() {
  await updateHeader();
  navigateTo('dashboard');
  startAutoRefresh();
}

document.addEventListener('keydown', (e) => {
  const map = {'1':'dashboard','2':'chart','3':'signal','4':'strategies','5':'backtest','6':'compare','7':'settings','8':'debug'};
  if (map[e.key] && !e.ctrlKey && !e.metaKey && !e.altKey && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'SELECT') {
    navigateTo(map[e.key]);
  }
});

init();
</script>

<head>

tailwind.config={theme:{extend:{fontFamily:{display:['Space Grotesk','sans-serif'],mono:['JetBrains Mono','monospace']}}}}

<style>
:root{--bg:#060a12;--bg2:#0c1220;--bg3:#111a2e;--border:#1a2540;--fg:#e4e9f0;--muted:#5a6a82;--accent:#10b981;--accent2:#059669;--buy:#22c55e;--sell:#ef4444;--hold:#f59e0b}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--fg);font-family:'Space Grotesk',sans-serif;overflow-x:hidden}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px;transition:all .3s ease}
.card:hover{border-color:rgba(16,185,129,.15);box-shadow:0 0 30px rgba(16,185,129,.06)}
.pulse-dot{width:8px;height:8px;border-radius:50%;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.5)}}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 16px;border-radius:8px;color:var(--muted);cursor:pointer;transition:all .2s ease;font-size:14px;font-weight:500}
.nav-item:hover{color:var(--fg);background:var(--bg3)}
.nav-item.active{color:var(--accent);background:rgba(16,185,129,.1);border-left:3px solid var(--accent)}
.nav-item i{width:20px;text-align:center;font-size:15px}
.btn{padding:8px 18px;border-radius:8px;border:none;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:13px;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);color:#000}
.btn-primary:hover{background:var(--accent2);transform:translateY(-1px)}
.btn-danger{background:rgba(239,68,68,.15);color:var(--sell);border:1px solid rgba(239,68,68,.3)}
.btn-danger:hover{background:rgba(239,68,68,.25)}
.btn-secondary{background:var(--bg3);color:var(--fg);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--accent)}
.btn-sm{padding:5px 12px;font-size:12px}
.mono{font-family:'JetBrains Mono',monospace}
.badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-weight:700;font-size:13px;letter-spacing:.5px}
.badge-buy{background:rgba(34,197,94,.15);color:var(--buy)}
.badge-sell{background:rgba(239,68,68,.15);color:var(--sell)}
.badge-hold{background:rgba(245,158,11,.15);color:var(--hold)}
.fade-in{animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.toast-container{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 20px;border-radius:10px;font-size:13px;font-weight:500;animation:slideIn .3s ease,fadeOut .3s ease 2.7s;min-width:250px;box-shadow:0 8px 30px rgba(0,0,0,.4)}
.toast-success{background:rgba(34,197,94,.15);color:var(--buy);border:1px solid rgba(34,197,94,.3)}
.toast-error{background:rgba(239,68,68,.15);color:var(--sell);border:1px solid rgba(239,68,68,.3)}
.toast-info{background:rgba(16,185,129,.15);color:var(--accent);border:1px solid rgba(16,185,129,.3)}
.toast-warn{background:rgba(245,158,11,.15);color:var(--hold);border:1px solid rgba(245,158,11,.3)}
@keyframes slideIn{from{transform:translateX(100px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes fadeOut{to{opacity:0;transform:translateX(50px)}}
.stat-value{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:700;line-height:1.1}
.stat-label{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:1px;margin-top:4px}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 12px;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);border-bottom:1px solid var(--border);font-weight:600}
td{padding:10px 12px;font-size:13px;border-bottom:1px solid rgba(26,37,64,.5)}
tr:hover td{background:rgba(16,185,129,.03)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:999;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s ease}
.modal-content{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:24px;max-width:480px;width:90%}
.bg-pattern{background-image:radial-gradient(circle at 20% 20%,rgba(16,185,129,.03) 0%,transparent 50%),radial-gradient(circle at 80% 80%,rgba(16,185,129,.02) 0%,transparent 50%)}
.sidebar{width:230px;min-width:230px}
@media(max-width:768px){.sidebar{position:fixed;left:-240px;z-index:100;height:100vh;transition:left .3s;background:var(--bg2);border-right:1px solid var(--border)}.sidebar.open{left:0}.main-content{margin-left:0!important}}
.progress-bar{height:6px;border-radius:3px;background:var(--bg3);overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .5s ease}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.wake-overlay{position:fixed;inset:0;background:rgba(6,10,18,.95);z-index:10000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px}
.wake-bar{width:200px;height:4px;border-radius:2px;background:var(--bg3);overflow:hidden}
.wake-bar-fill{height:100%;background:var(--accent);border-radius:2px;animation:wakeFill 4s ease-in-out forwards}
@keyframes wakeFill{0%{width:0}30%{width:30%}60%{width:55%}80%{width:75%}100%{width:100%}}
.data-slot{min-height:32px;display:flex;align-items:center}
.data-loading{color:var(--muted);font-size:12px;display:flex;align-items:center;gap:6px}
.data-loading .mini-spin{width:12px;height:12px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
.data-error{color:var(--sell);font-size:12px;cursor:pointer}
.data-error:hover{text-decoration:underline}
</style>
</head>

<div class="wake-overlay" id="wake-overlay">

<div class="flex" style="min-height:calc(100vh - 52px)">
  <nav class="sidebar border-r border-[var(--border)] p-4 flex flex-col gap-1" style="background:var(--bg2)" id="sidebar">

      </div>

  <main class="flex-1 p-5 md:p-8 overflow-y-auto main-content" id="main-content"></main>

<script>
// ============================
// CONFIG
// ============================
const API = '';
const API_TIMEOUT = 90000;
let refreshTimer = null;
let currentPage = 'dashboard';
let chartInstance = null;
let rsiChartInstance = null;
let serverAwake = false;

// ============================
// API AVEC TIMEOUT + RETRY SEQUENTIEL
// ============================
async function api(endpoint, options = {}, retryCount = 0) {
  const url = `${API}${endpoint}`;
  const controller = new AbortController();
  const tid = setTimeout(() => controller.abort(), API_TIMEOUT);

  try {
    console.log(`[API] ${options.method||'GET'} ${url} (essai ${retryCount+1})`);
    const resp = await fetch(url, {
      ...options,
      signal: controller.signal,
      headers: { 'Content-Type': 'application/json', ...(options.headers||{}) }
    });
    clearTimeout(tid);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    console.log(`[API] ${endpoint} OK:`, typeof data === 'object' ? JSON.stringify(data).substring(0,120) : data);
    return data;
  } catch (e) {
    clearTimeout(tid);
    const isTimeout = e.name === 'AbortError';
    console.warn(`[API] ${endpoint} ECHEC: ${isTimeout?'Timeout':e.message}`);
    if (retryCount < 2 && (isTimeout || e.message.includes('Failed to fetch') || e.message.includes('NetworkError'))) {
      const delay = (retryCount + 1) * 5000;
      console.log(`[API] Retry ${endpoint} dans ${delay/1000}s...`);
      await new Promise(r => setTimeout(r, delay));
      return api(endpoint, options, retryCount + 1);
    }
    return null;
  }
}

// Appels API un par un (pas Promise.all) pour eviter de surcharger Render
async function apiSequence(calls) {
  const results = [];
  for (const call of calls) {
    const result = await api(call.endpoint, call.options || {});
    results.push({ key: call.key, data: result });
  }
  return results;
}

// ============================
// CALCULS TECHNIQUES
// ============================
function calcEMA(closes, period) {
  const r = [closes[0]]; const k = 2 / (period + 1);
  for (let i = 1; i < closes.length; i++) r.push(closes[i] * k + r[i-1] * (1 - k));
  return r;
}
function calcRSI(closes, period = 14) {
  const rsi = new Array(closes.length).fill(50);
  if (closes.length < period + 1) return rsi;
  let gs = 0, ls = 0;
  for (let i = 1; i <= period; i++) { const d = closes[i]-closes[i-1]; if(d>0)gs+=d;else ls-=d; }
  let ag = gs/period, al = ls/period;
  rsi[period] = 100 - 100/(1+ag/(al||.0001));
  for (let i = period+1; i < closes.length; i++) {
    const d = closes[i]-closes[i-1];
    ag = (ag*(period-1)+(d>0?d:0))/period;
    al = (al*(period-1)+(d<0?-d:0))/period;
    rsi[i] = 100-100/(1+ag/(al||.0001));
  }
  return rsi;
}

// ============================
// UTILITAIRES
// ============================
function fmt(n,d=2){return n!=null?Number(n).toFixed(d):'---'}
function fmtPct(n){return n!=null?(n>=0?'+':'')+Number(n).toFixed(2)+'%':'---'}
function fmtTime(ts){if(!ts)return'---';return new Date(ts*1000).toLocaleString('fr-FR',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}
function fmtDateTime(ts){if(!ts)return'---';return new Date(ts*1000).toLocaleString('fr-FR')}
function signalColor(s){return s==='BUY'?'var(--buy)':s==='SELL'?'var(--sell)':'var(--hold)'}
function signalBadge(s){
  if(!s||s==='---')return'<span class="badge badge-hold"><i class="fas fa-minus text-xs"></i>---</span>';
  const c=s==='BUY'?'badge-buy':s==='SELL'?'badge-sell':'badge-hold';
  const i=s==='BUY'?'fa-arrow-up':s==='SELL'?'fa-arrow-down':'fa-minus';
  return`<span class="badge ${c}"><i class="fas ${i} text-xs"></i>${s}</span>`;
}

// Slot de donnee : affiche loading / erreur / valeur
function slot(id, loader = true) {
  return `<div class="data-slot" id="${id}">${loader ? '<span class="data-loading"><span class="mini-spin"></span>Chargement...</span>' : '<span class="text-muted mono">---</span>'}</div>`;
}
function fillSlot(id, html) {
  const el = document.getElementById(id);
  if (el) el.innerHTML = html;
}
function fillSlotError(id, endpoint) {
  fillSlot(id, `<span class="data-error" onclick="retrySlot('${id}','${endpoint}')"><i class="fas fa-exclamation-circle"></i> Erreur - reessayer</span>`);
}

// Acces DOM securise : ne plante pas si l'element n'existe plus
function safeHTML(id, html) {
    const el = document.getElementById(id);
    if (el) el.innerHTML = html;
}
function safeText(id, text) {
    const el = document.getElementById(id);
    if (el) el.textContent = text;
}
function safeStyle(id, prop, val) {
    const el = document.getElementById(id);
    if (el) el.style[prop] = val;
}
// Verifie qu'on est toujours sur la bonne page avant de modifier le DOM
function stillOnPage(page) {
    return currentPage === page;
}

// Retry pour un slot individuel
const slotRetryFns = {};
function retrySlot(id, endpoint) {
  fillSlot(id, '<span class="data-loading"><span class="mini-spin"></span>Chargement...</span>');
  if (slotRetryFns[id]) slotRetryFns[id]();
}

function toast(msg, type='info') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  const icons = {success:'fa-check-circle',error:'fa-exclamation-circle',info:'fa-info-circle',warn:'fa-exclamation-triangle'};
  el.innerHTML = `<i class="fas ${icons[type]||icons.info}"></i> ${msg}`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>el.remove(),4000);
}

function showModal(title, content, actions='') {
  document.getElementById('modal-root').innerHTML=`
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal-content fade-in">
        <div class="flex items-center justify-between mb-4"><h3 class="font-bold text-lg">${title}</h3><button onclick="closeModal()" class="text-muted hover:text-fg text-lg"><i class="fas fa-times"></i></button></div>
        <div class="mb-5">${content}</div>
        <div class="flex justify-end gap-3">${actions}</div>
      </div>
    </div>`;
}
function closeModal(){document.getElementById('modal-root').innerHTML=''}

// ============================
// NAVIGATION
// ============================
document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', () => {
    const page = item.dataset.page;
    if (!page) return;
    navigateTo(page);
    document.getElementById('sidebar').classList.remove('open');
  });
});
document.getElementById('menu-toggle').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('open');
});

function navigateTo(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.page === page));
  renderPage(page);
}

function renderPage(page) {
  const main = document.getElementById('main-content');
  const renderers = {dashboard:renderDashboard,chart:renderChart,signal:renderSignal,strategies:renderStrategies,backtest:renderBacktest,compare:renderCompare,settings:renderSettings,debug:renderDebug};
  const fn = renderers[page];
  if (fn) { main.innerHTML = '<div class="fade-in">'+fn()+'</div>'; initPage(page); }
}

function initPage(page) {
  const inits = {dashboard:initDashboard,chart:initChart,signal:initSignal,strategies:initStrategies,backtest:initBacktest,compare:initCompare,settings:initSettings,debug:initDebug};
  const fn = inits[page];
  if (fn) fn();
}

// ============================
// REVEIL DU SERVEUR
// ============================
async function wakeServer() {
  const overlay = document.getElementById('wake-overlay');
  const statusEl = document.getElementById('wake-status');
  const detailEl = document.getElementById('wake-detail');

  statusEl.textContent = 'Connexion au serveur...';
  detailEl.textContent = 'Le serveur peut mettre 30-60s a se reveiller';

  // Premier ping : /version (leger)
  let v = await api('/version');
  if (v) {
    serverAwake = true;
    statusEl.textContent = 'Serveur en ligne !';
    detailEl.textContent = 'Chargement des donnees...';
    overlay.style.opacity = '0';
    overlay.style.transition = 'opacity 0.5s';
    setTimeout(() => overlay.remove(), 500);
    return true;
  }

  // Deuxieme tentative
  statusEl.textContent = 'Deuxieme tentative...';
  v = await api('/version');
  if (v) {
    serverAwake = true;
    statusEl.textContent = 'Serveur en ligne !';
    overlay.style.opacity = '0';
    overlay.style.transition = 'opacity 0.5s';
    setTimeout(() => overlay.remove(), 500);
    return true;
  }

  // Troisieme tentative
  statusEl.textContent = 'Troisieme tentative...';
  v = await api('/version');
  if (v) {
    serverAwake = true;
    overlay.style.opacity = '0';
    overlay.style.transition = 'opacity 0.5s';
    setTimeout(() => overlay.remove(), 500);
    return true;
  }

  statusEl.textContent = 'Serveur indisponible';
  detailEl.textContent = 'Verifiez que le serveur Render est bien deploye';
  document.getElementById('wake-bar-fill').style.background = 'var(--sell)';
  return false;
}

// ============================
// DASHBOARD
// ============================
function renderDashboard() {
  return `
    <div class="mb-6">
      <h1 class="font-display text-3xl font-bold tracking-tight">Tableau de bord</h1>
      <p class="text-muted text-sm mt-1">Vue d'ensemble BCHUSDT</p>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-5">
      <div class="card">
        <div class="stat-label">Prix actuel</div>
        ${slot('dash-price')}
        <div class="text-muted text-xs mt-2 mono" id="dash-price-time">---</div>
      </div>
      <div class="card">
        <div class="stat-label">Signal</div>
        ${slot('dash-signal')}
        <div class="text-muted text-xs mt-2" id="dash-signal-indicators">---</div>
      </div>
      <div class="card">
        <div class="stat-label">Strategie active</div>
        ${slot('dash-strategy-name')}
        <div class="text-muted text-xs mt-2" id="dash-strategy-params">---</div>
      </div>
    </div>
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-5">
      <div class="card text-center"><div class="stat-label">Bougies</div>${slot('dash-candles')}</div>
      <div class="card text-center"><div class="stat-label">Timeframe</div>${slot('dash-timeframe')}</div>
      <div class="card text-center"><div class="stat-label">EMA Fast / Slow</div>${slot('dash-ema')}</div>
      <div class="card text-center"><div class="stat-label">RSI</div>${slot('dash-rsi')}</div>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div class="card">
        <h3 class="font-semibold text-sm mb-3 flex items-center gap-2"><i class="fas fa-database text-accent"></i>Base de donnees</h3>
        <div class="space-y-2 text-sm">
          <div class="flex justify-between"><span class="text-muted">Min</span>${slot('dash-db-min')}</div>
          <div class="flex justify-between"><span class="text-muted">Max</span>${slot('dash-db-max')}</div>
          <div class="flex justify-between"><span class="text-muted">Total</span>${slot('dash-db-count')}</div>
        </div>
      </div>

async function loadChart() {
  const area = document.getElementById('chart-area');
  area.innerHTML = '<div class="card text-center py-10"><div class="spinner mx-auto mb-3"></div><p class="text-muted">Chargement des bougies (peut prendre 30-60s)...</p></div>';

  const history = await api('/history');
  if (!history || history.length === 0) {
    area.innerHTML = '<div class="card text-center py-10"><i class="fas fa-exclamation-triangle text-3xl text-hold mb-3"></i><p class="text-muted">Aucune donnee. Cliquez Refresh puis reessayez.</p></div>';
    return;
  }

  let emaFast=9,emaSlow=20,emaTrend=50,rsiPeriod=14;
  const sel = document.getElementById('chart-strategy-select');
  if (sel && sel.value) {
    const s = await api('/strategy/'+sel.value);
    if (s && !s.error) { emaFast=s.ema_fast;emaSlow=s.ema_slow;emaTrend=s.ema_trend;rsiPeriod=s.rsi_period; }
  }

  const sorted = [...history].sort((a,b)=>a.timestamp-b.timestamp);
  const closes = sorted.map(c=>c.close);
  const efd=calcEMA(closes,emaFast), esd=calcEMA(closes,emaSlow), etd=calcEMA(closes,emaTrend), rd=calcRSI(closes,rsiPeriod);

  const cd = sorted.map(c=>({time:c.timestamp,open:c.open,high:c.high,low:c.low,close:c.close}));
  const efl = sorted.map((c,i)=>({time:c.timestamp,value:efd[i]}));
  const esl = sorted.map((c,i)=>({time:c.timestamp,value:esd[i]}));
  const etl = sorted.map((c,i)=>({time:c.timestamp,value:etd[i]}));
  const rl = sorted.map((c,i)=>({time:c.timestamp,value:rd[i]}));
  const vd = sorted.map(c=>({time:c.timestamp,value:c.volume,color:c.close>=c.open?'rgba(34,197,94,.25)':'rgba(239,68,68,.25)'}));

  const markers=[];
  for(let i=1;i<sorted.length;i++){
    if(efd[i-1]<=esd[i-1]&&efd[i]>esd[i]&&rd[i]>55&&closes[i]>etd[i])
      markers.push({time:sorted[i].timestamp,position:'belowBar',color:'#22c55e',shape:'arrowUp',text:'BUY'});
    else if(efd[i-1]>=esd[i-1]&&efd[i]<esd[i])
      markers.push({time:sorted[i].timestamp,position:'aboveBar',color:'#ef4444',shape:'arrowDown',text:'SELL'});
  }

  if(chartInstance){chartInstance.remove();chartInstance=null}
  if(rsiChartInstance){rsiChartInstance.remove();rsiChartInstance=null}

  area.innerHTML = `
    <div class="card mb-3" style="padding:8px"><div id="trading-chart" style="height:450px"></div></div>
    <div class="card" style="padding:8px">
      <div class="flex items-center gap-3 mb-1 px-2"><span class="text-muted text-xs font-semibold">RSI (${rsiPeriod})</span><span class="mono text-xs" id="chart-rsi-value">---</span></div>
      <div id="rsi-chart" style="height:150px"></div>
    </div>
    <div class="mt-3 flex items-center gap-4 text-xs text-muted">
      <span><span style="color:#10b981">___</span> EMA Fast</span>
      <span><span style="color:#f59e0b">___</span> EMA Slow</span>
      <span><span style="color:#8b5cf6">___</span> EMA Trend</span>
    </div>`;

  const cc = document.getElementById('trading-chart');
  chartInstance = LightweightCharts.createChart(cc,{
    width:cc.clientWidth,height:450,
    layout:{background:{type:'solid',color:'transparent'},textColor:'#5a6a82',fontSize:11,fontFamily:'JetBrains Mono'},
    grid:{vertLines:{color:'rgba(26,37,64,.5)'},horzLines:{color:'rgba(26,37,64,.5)'}},
    crosshair:{mode:LightweightCharts.CrosshairMode.Normal},
    rightPriceScale:{borderColor:'rgba(26,37,64,.8)'},
    timeScale:{borderColor:'rgba(26,37,64,.8)',timeVisible:true},
    handleScroll:{mouseWheel:true,pressedMouseMove:true},
    handleScale:{axisPressedMouseMove:true,mouseWheel:true,pinch:true}
  });

  const cs = chartInstance.addCandlestickSeries({upColor:'#22c55e',downColor:'#ef4444',borderUpColor:'#22c55e',borderDownColor:'#ef4444',wickUpColor:'#22c55e80',wickDownColor:'#ef444480'});
  cs.setData(cd);
  if(markers.length>0)cs.setMarkers(markers);
  chartInstance.addLineSeries({color:'#10b981',lineWidth:1,title:`EMA${emaFast}`}).setData(efl);
  chartInstance.addLineSeries({color:'#f59e0b',lineWidth:1,title:`EMA${emaSlow}`}).setData(esl);
  chartInstance.addLineSeries({color:'#8b5cf6',lineWidth:1,lineStyle:2,title:`EMA${emaTrend}`}).setData(etl);
  const vs = chartInstance.addHistogramSeries({priceFormat:{type:'volume'},priceScaleId:'volume'});
  chartInstance.priceScale('volume').applyOptions({scaleMargins:{top:.85,bottom:0}});
  vs.setData(vd);
  chartInstance.timeScale().fitContent();

  const rc = document.getElementById('rsi-chart');
  rsiChartInstance = LightweightCharts.createChart(rc,{
    width:rc.clientWidth,height:150,
    layout:{background:{type:'solid',color:'transparent'},textColor:'#5a6a82',fontSize:10,fontFamily:'JetBrains Mono'},
    grid:{vertLines:{color:'rgba(26,37,64,.3)'},horzLines:{color:'rgba(26,37,64,.3)'}},
    rightPriceScale:{borderColor:'rgba(26,37,64,.8)',scaleMargins:{top:.1,bottom:.1}},
    timeScale:{borderColor:'rgba(26,37,64,.8)',timeVisible:true,visible:false},
    crosshair:{mode:LightweightCharts.CrosshairMode.Normal}
  });
  rsiChartInstance.addLineSeries({color:'#a78bfa',lineWidth:1.5}).setData(rl);
  rsiChartInstance.addLineSeries({color:'rgba(34,197,94,.3)',lineWidth:1,lineStyle:2}).setData(sorted.map(c=>({time:c.timestamp,value:30})));
  rsiChartInstance.addLineSeries({color:'rgba(239,68,68,.3)',lineWidth:1,lineStyle:2}).setData(sorted.map(c=>({time:c.timestamp,value:70})));
  rsiChartInstance.timeScale().fitContent();

  chartInstance.timeScale().subscribeVisibleLogicalRangeChange(r=>{if(r)rsiChartInstance.timeScale().setVisibleLogicalRange(r)});
  rsiChartInstance.timeScale().subscribeVisibleLogicalRangeChange(r=>{if(r)chartInstance.timeScale().setVisibleLogicalRange(r)});

  const lr = rd[rd.length-1];
  const rEl = document.getElementById('chart-rsi-value');
  if(rEl){rEl.textContent=fmt(lr,1);rEl.style.color=lr>70?'var(--sell)':lr<30?'var(--buy)':'var(--fg)'}

  new ResizeObserver(()=>{
    chartInstance.applyOptions({width:cc.clientWidth});
    rsiChartInstance.applyOptions({width:rc.clientWidth});
  }).observe(cc);
}

// Sauvegarder les modifications
async function saveStrategyEdit(id) {
    const data = {
        name: document.getElementById('edit-name').value,
        ema_fast: parseInt(document.getElementById('edit-ema-fast').value),
        ema_slow: parseInt(document.getElementById('edit-ema-slow').value),
        ema_trend: parseInt(document.getElementById('edit-ema-trend').value),
        rsi_period: parseInt(document.getElementById('edit-rsi-period').value),
        rsi_min: parseInt(document.getElementById('edit-rsi-min').value),
        stop_loss: parseFloat(document.getElementById('edit-stop-loss').value),
        take_profit: parseFloat(document.getElementById('edit-take-profit').value),
        initial_capital: parseFloat(document.getElementById('edit-initial-capital').value)
    };

    // Validation basique
    if (!data.name || data.ema_fast >= data.ema_slow || data.ema_slow >= data.ema_trend) {
        toast('EMA Fast < EMA Slow < EMA Trend requis', 'error');
        return;
    }
    if (data.stop_loss <= 0 || data.take_profit <= 0) {
        toast('SL et TP doivent etre > 0', 'error');
        return;
    }

    const result = await api('/strategy/' + id + '/update', {
        method: 'PUT',
        body: JSON.stringify(data)
    });

    if (result && result.success) {
        closeModal();
        toast('Strategie mise a jour', 'success');
        initStrategies();
    } else {
        toast('Erreur lors de la mise a jour', 'error');
    }
}

// Ouvrir le modal des parametres
async function editSettingsModal() {
    const settings = await api('/settings');
    if (!settings) {
        toast('Erreur chargement parametres', 'error');
        return;
    }

    const fields = [
        { key: 'timeframe', label: 'Timeframe', type: 'text', placeholder: '1hour, 4hour, etc.' },
        { key: 'history_size', label: 'Taille historique', type: 'number' },
        { key: 'ema_fast', label: 'EMA Fast', type: 'number' },
        { key: 'ema_slow', label: 'EMA Slow', type: 'number' },
        { key: 'rsi_period', label: 'RSI Periode', type: 'number' },
        { key: 'stop_loss', label: 'Stop Loss', type: 'number', step: '0.01' },
        { key: 'take_profit', label: 'Take Profit', type: 'number', step: '0.01' },
        { key: 'initial_capital', label: 'Capital initial ($)', type: 'number', step: '100' }
    ];

    let formHtml = '<div class="space-y-3">';
    fields.forEach(f => {
        formHtml += `
            <div>
                <label class="text-xs text-muted block mb-1">${f.label}</label>
                <input 
                    type="${f.type}" 
                    id="setting-${f.key}" 
                    value="${settings[f.key] !== undefined ? settings[f.key] : ''}" 
                    ${f.step ? `step="${f.step}"` : ''}

                />

    showModal(

         <button onclick="saveSettingsEdit()" class="btn btn-primary"><i class="fas fa-save"></i>Sauvegarder</button>`

// Sauvegarder les parametres
async function saveSettingsEdit() {
    const keys = ['timeframe', 'history_size', 'ema_fast', 'ema_slow', 'rsi_period', 'stop_loss', 'take_profit', 'initial_capital'];
    const data = {};

    keys.forEach(k => {
        const el = document.getElementById(`setting-${k}`);
        if (el) data[k] = el.value;
    });

    // Validation basique
    const emaFast = parseInt(data.ema_fast);
    const emaSlow = parseInt(data.ema_slow);
    if (emaFast >= emaSlow) {
        toast('EMA Fast doit etre inferieur a EMA Slow', 'error');
        return;
    }

    const result = await api('/settings/update', {
        method: 'POST',
        body: JSON.stringify(data)
    });

    if (result && result.success) {
        closeModal();
        toast('Parametres mis a jour', 'success');
        initSettings();
        updateHeader();
    } else {
        toast('Erreur lors de la mise a jour', 'error');
    }
}

async function runBacktest() {

async function runCompare() {
  document.getElementById('compare-content').innerHTML='<div class="card text-center py-10"><div class="spinner mx-auto mb-3"></div><p class="text-muted">Comparaison (30-90s)...</p></div>';
  const result=await api('/backtest/compare');
  if(!result||!result.strategies||result.strategies.length===0){
    document.getElementById('compare-content').innerHTML='<div class="card text-center py-10"><i class="fas fa-exclamation-triangle text-3xl text-hold mb-3"></i><p class="text-muted">Aucun resultat</p></div>';return;
  }
  const best=result.best_strategy;
  const maxPct=Math.max(...result.strategies.map(s=>Math.abs(s.profit_pct)),1);
  let html='';
  if(best){
    html+=`<div class="card mb-5" style="border-color:var(--accent);box-shadow:0 0 20px rgba(16,185,129,.1)">
      <div class="flex items-center gap-3 mb-3"><div class="w-10 h-10 rounded-lg flex items-center justify-center" style="background:rgba(16,185,129,.15)"><i class="fas fa-trophy text-accent"></i></div>
      <div><div class="font-bold">Meilleure: ${best.name}</div><div class="text-muted text-xs mono">ID:${best.id}</div></div></div>
      <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
        <div><div class="stat-label">Profit</div><div class="mono font-bold text-lg" style="color:${best.profit_pct>=0?'var(--buy)':'var(--sell)'}">${fmtPct(best.profit_pct)}</div></div>
        <div><div class="stat-label">Capital</div><div class="mono font-bold text-lg">$${fmt(best.capital_end)}</div></div>
        <div><div class="stat-label">Win Rate</div><div class="mono font-bold text-lg">${fmt(best.win_rate,1)}%</div></div>
        <div><div class="stat-label">Trades</div><div class="mono font-bold text-lg">${best.trades_count}(${best.wins}W/${best.losses}L)</div></div>
      </div></div>`;
  }
  html+=`<div class="card mb-5"><h3 class="font-semibold text-sm mb-4"><i class="fas fa-table text-accent mr-2"></i>Classement</h3>
    <div class="overflow-x-auto"><table><thead><tr><th>#</th><th>Strategie</th><th>Profit</th><th>Capital</th><th>Trades</th><th>Win Rate</th></tr></thead><tbody>
    ${result.strategies.map((s,i)=>`<tr><td><span class="inline-flex items-center justify-center w-6 h-6 rounded-full text-xs font-bold" style="background:${i===0?'rgba(16,185,129,.2)':'var(--bg3)'};color:${i===0?'var(--accent)':'var(--muted)'}">${i+1}</span></td>
    <td class="font-semibold">${s.name}</td><td class="mono font-semibold" style="color:${s.profit_pct>=0?'var(--buy)':'var(--sell)'}">${fmtPct(s.profit_pct)}</td>
    <td class="mono">$${fmt(s.capital_end)}</td><td class="mono">${s.trades_count}</td><td class="mono">${fmt(s.win_rate,1)}%</td></tr>`).join('')}
    </tbody></table></div></div>`;
  html+=`<div class="card"><h3 class="font-semibold text-sm mb-4"><i class="fas fa-chart-bar text-accent mr-2"></i>Visualisation</h3><div class="space-y-3">
    ${result.strategies.map(s=>{const w=Math.max(((s.profit_pct+maxPct)/(2*maxPct))*100,2);return`<div><div class="flex items-center justify-between mb-1"><span class="text-sm font-medium">${s.name}</span><span class="mono text-sm" style="color:${s.profit_pct>=0?'var(--buy)':'var(--sell)'}">${fmtPct(s.profit_pct)}</span></div>
    <div class="h-8 rounded-lg" style="background:var(--bg3)"><div class="h-full rounded-lg" style="width:${w}%;background:${s.profit_pct>=0?'rgba(34,197,94,.2)':'rgba(239,68,68,.2)'};border:1px solid ${s.profit_pct>=0?'rgba(34,197,94,.3)':'rgba(239,68,68,.3)'}"></div></div></div>`}).join('')}
  </div></div>`;
  document.getElementById('compare-content').innerHTML=html;
}

    if(r.data&&r.data.length>0){
      html+=`<div class="card mb-4"><h3 class="font-semibold text-sm mb-3"><i class="fas fa-table text-accent mr-2"></i>5 dernieres bougies</h3>
        <div class="overflow-x-auto"><table><thead><tr><th>Time</th><th>Open</th><th>Close</th><th>High</th><th>Low</th><th>Vol</th></tr></thead>
        <tbody>${r.data.slice(0,5).map(c=>`<tr><td class="mono text-xs">${fmtTime(parseInt(c[0]))}</td><td class="mono">${c[1]}</td><td class="mono">${c[2]}</td><td class="mono">${c[3]}</td><td class="mono">${c[4]}</td><td class="mono">${c[5]}</td></tr>`).join('')}</tbody></table></div></div>`;
    }
  }
  html+=`<div class="card"><h3 class="font-semibold text-sm mb-3"><i class="fas fa-file-code text-accent mr-2"></i>Brut</h3>
    <pre class="mono text-xs text-muted overflow-x-auto p-3 rounded-lg" style="background:var(--bg);max-height:400px">${JSON.stringify(result,null,2)}</pre></div>`;
  document.getElementById('debug-content').innerHTML=html;
}

// ============================
// REFRESH
// ============================
async function refreshData() {
  const icon=document.getElementById('refresh-icon');
  icon.classList.add('fa-spin');
  try {
    const result=await api('/refresh');
    if(result){toast(`${result.loaded} bougies, ${result.stored_candles} en base`,'success');await updateHeader();if(currentPage==='chart')await loadChart()}
    else toast('Erreur refresh','error');
  } finally{icon.classList.remove('fa-spin')}
}

// ============================
// HEADER UPDATE
// ============================
async function updateHeader() {
    const sig = await api('/signal');
    const connected = sig && !sig.error;
    safeStyle('hdr-status', 'background', connected ? 'var(--buy)' : 'var(--sell)');
    safeText('hdr-status-text', connected ? 'En ligne' : 'Hors ligne');
    if (connected) {
        safeText('hdr-price', fmt(sig.price,4));
        safeStyle('hdr-signal-dot', 'background', signalColor(sig.signal));
        safeText('hdr-signal-text', sig.signal);
        safeStyle('hdr-signal-text', 'color', signalColor(sig.signal));
    }
    const stats = await api('/stats');
    if (stats && !stats.error) safeText('side-candles', stats.stored_candles);
    const ver = await api('/version');
    if (ver) safeText('side-version', ver.version);
}

// ============================
// AUTO-REFRESH
// ============================
function startAutoRefresh(){if(refreshTimer)clearInterval(refreshTimer);refreshTimer=setInterval(()=>updateHeader(),120000)}

// ============================
// INIT
// ============================
async function init() {
  const awake = await wakeServer();
  if (awake) {
    await updateHeader();
    navigateTo('dashboard');
    startAutoRefresh();
  }
}

document.addEventListener('keydown',e=>{
  const m={'1':'dashboard','2':'chart','3':'signal','4':'strategies','5':'backtest','6':'compare','7':'settings','8':'debug'};
  if(m[e.key]&&!e.ctrlKey&&!e.metaKey&&!e.altKey&&document.activeElement.tagName!=='INPUT'&&document.activeElement.tagName!=='SELECT')navigateTo(m[e.key]);
});

init();
</script>
</body>
</html>
